name: beep-ai-code-ci

on:
  push:
    paths:
      - "beep/**"
      - "tests/**"
      - "tools/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "beep/**"
      - "tests/**"
      - "tools/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install development dependencies
        run: pip install -e ".[dev]"

      - name: Enforce Python file-length policy
        run: python tools/ci/check_file_lengths.py --repo-root .

      - name: Validate release readiness
        run: python -m tools.ci.check_release_readiness

      - name: Run full test suite
        run: pytest -q --tb=short tests/

      - name: Lint with Ruff
        run: ruff check beep tests

  package:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging tools
        run: python -m pip install --upgrade pip build twine pipx

      - name: Build wheel and sdist
        run: python -m build

      - name: Generate release checksum manifest
        run: python tools/ci/generate_release_checksums.py --artifacts-dir dist

      - name: Build synthetic older wheel for upgrade smoke
        run: python tools/ci/build_upgrade_fixture.py --source-root . --output-dir .upgrade-dist --fixture-version 0.0.0

      - name: Validate built artifacts
        run: python -m twine check dist/*.whl dist/*.tar.gz

      - name: Smoke test wheel install in fresh venv
        shell: bash
        run: |
          python -m venv .artifact-venv
          source .artifact-venv/bin/activate
          python -m pip install --upgrade pip
          pip install dist/*.whl
          beep --help > /dev/null

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install development dependencies with optional extras
        run: pip install -e ".[dev,schema]"

      - name: Run portable bundle packaging and deployment dry-run tests
        run: pytest -q tests/test_agent_package_commands.py tests/test_agent_deploy_commands.py

      - name: Run CLI smoke tests
        run: pytest -q tests/test_cli_smoke.py

      - name: Run CLI guard and command runtime tests
        run: pytest -q tests/test_cli_guards.py tests/test_command_runtime_guards.py

      - name: Run setup wizard smoke test
        run: pytest -q tests/test_setup_wizard.py

      - name: Run diagnostics and self-update command tests
        run: pytest -q tests/test_diagnostics_command.py tests/test_self_update_command.py

      - name: Run workspace command smoke tests
        run: pytest -q tests/test_workspace_commands.py

      - name: Run session history tests
        run: pytest -q tests/test_sessions.py tests/test_session_commands.py

      - name: Run hook lifecycle tests
        run: pytest -q tests/test_hooks.py

      - name: Run task/watch/session flow integration tests
        run: pytest -q tests/test_task_watch_session_flows.py

      - name: Smoke test pipx install from built wheel
        shell: bash
        run: |
          pipx install --force dist/*.whl
          ~/.local/bin/beep --help > /dev/null

      - name: Smoke test upgrade from older artifact to current wheel
        shell: bash
        run: |
          CURRENT_VERSION=$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path("beep/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'^__version__ = "([^"]+)"', text, re.MULTILINE)
          if match is None:
              raise SystemExit("Unable to determine current CLI version")
          print(match.group(1))
          PY
          )
          python -m venv .upgrade-venv
          source .upgrade-venv/bin/activate
          python -m pip install --upgrade pip
          pip install .upgrade-dist/*.whl
          python - <<'PY'
          from importlib.metadata import version
          assert version("beep-ai-code") == "0.0.0", version("beep-ai-code")
          PY
          pip install --upgrade dist/*.whl
          CURRENT_VERSION="$CURRENT_VERSION" python - <<'PY'
          import os
          from importlib.metadata import version
          expected = os.environ["CURRENT_VERSION"]
          actual = version("beep-ai-code")
          assert actual == expected, (actual, expected)
          PY
          beep --help > /dev/null